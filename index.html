const fmtPct = (n) => (!isFinite(n) || isNaN(n)) ? '—' : `${(n * 100).toFixed(1).replace('.', ',')}%`;
const fmtPctSimple = (n) => (!isFinite(n) || isNaN(n)) ? '—' : `${Math.round(n * 100)}%`;

const monthLabel = (key) => {
  if (!key) return '—';
  const [y, m] = key.split('-');
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${meses[parseInt(m) - 1]} ${y}`;
};
const monthShort = (key) => {
  if (!key) return '';
  const [y, m] = key.split('-');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${meses[parseInt(m) - 1]}/${y.slice(2)}`;
};
const prevMonthKey = (key) => {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};
const nextMonthKey = (key) => {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
};
const yearAgoKey = (key) => {
  const [y, m] = key.split('-').map(Number);
  return `${y - 1}-${String(m).padStart(2, '0')}`;
};

// ============ ANALYTICS · FORECAST ============
// Linear regression on last N months. Returns predicted value, range, trend.
const linearForecast = (values, n = 4) => {
  const recent = values.slice(-n).filter((v) => v !== null && v !== undefined);
  if (recent.length < 2) return null;
  const m = recent.length;
  const xMean = (m - 1) / 2;
  const yMean = recent.reduce((s, v) => s + v, 0) / m;
  let num = 0, den = 0;
  for (let i = 0; i < m; i++) {
    num += (i - xMean) * (recent[i] - yMean);
    den += (i - xMean) ** 2;
  }
  const slope = den === 0 ? 0 : num / den;
  const intercept = yMean - slope * xMean;
  const predicted = intercept + slope * m;
  let ssRes = 0;
  for (let i = 0; i < m; i++) {
    const fitted = intercept + slope * i;
    ssRes += (recent[i] - fitted) ** 2;
  }
  const stdErr = Math.sqrt(ssRes / Math.max(1, m - 1));
  return {
    value: Math.max(0, predicted),
    low: Math.max(0, predicted - stdErr),
    high: predicted + stdErr,
    trend: Math.abs(slope) < 0.01 * yMean ? 'stable' : slope > 0 ? 'up' : 'down',
    samples: m,
    confidence: m >= 4 ? 'alta' : m >= 3 ? 'média' : 'baixa',
  };
};

// ============ ANALYTICS · ANOMALY ============
const detectAnomaly = (historicalValues, currentValue, lowerIsBetter = false) => {
  if (historicalValues.length < 2) return null;
  const avg = historicalValues.reduce((s, v) => s + v, 0) / historicalValues.length;
  if (avg === 0) return null;
  const variance = historicalValues.reduce((s, v) => s + (v - avg) ** 2, 0) / historicalValues.length;
  const stdDev = Math.sqrt(variance);
  const deviation = (currentValue - avg) / avg;
  const z = stdDev === 0 ? 0 : (currentValue - avg) / stdDev;
  const absDev = Math.abs(deviation);
  if (absDev < 0.25 && Math.abs(z) < 1.5) return null;
  const isUp = currentValue > avg;
  const isGood = lowerIsBetter ? !isUp : isUp;
  let severity = 'baixa';
  if (absDev >= 0.5 || Math.abs(z) >= 2.5) severity = 'alta';
  else if (absDev >= 0.35 || Math.abs(z) >= 2) severity = 'média';
  return { avg, stdDev, deviation, z, type: isUp ? 'pico' : 'queda', isGood, severity, current: currentValue };
};

// ============ ANALYTICS · REDISTRIBUTION ============
const recommendRedistribution = (curM) => {
  if (!curM || !curM.avgCostLeadRem || !curM.avgCostLeadFrio) return null;
  if (curM.remInv === 0 || curM.frioInv === 0) return null;
  const remCPL = curM.avgCostLeadRem;
  const frioCPL = curM.avgCostLeadFrio;
  const diff = Math.abs(remCPL - frioCPL);
  const cheaper = Math.min(remCPL, frioCPL);
  if (cheaper === 0) return null;
  const efficiency = diff / cheaper;
  if (efficiency < 0.20) return null;
  const cheaperChannel = remCPL < frioCPL ? 'Remarketing' : 'Frio';
  const expensiveChannel = remCPL < frioCPL ? 'Frio' : 'Remarketing';
  const expensiveInv = remCPL < frioCPL ? curM.frioInv : curM.remInv;
  const expensiveCPL = Math.max(remCPL, frioCPL);
  const movePct = efficiency >= 0.4 ? 0.30 : 0.20;
  const moveAmount = expensiveInv * movePct;
  const currentLeadsFromMove = moveAmount / expensiveCPL;
  const newLeadsFromMove = moveAmount / cheaper;
  const extraLeads = Math.round(newLeadsFromMove - currentLeadsFromMove);

  // ━━━ ESPECIFICAÇÃO POR PÚBLICO ━━━
  // Públicos pra REDUZIR: piores do canal caro (custo/msg alto + gasto significativo)
  // Públicos pra AUMENTAR: melhores do canal barato (custo/msg baixo + ainda com volume)
  const expensiveKey = expensiveChannel === 'Remarketing' ? 'remarketing' : 'frio';
  const cheaperKey = cheaperChannel === 'Remarketing' ? 'remarketing' : 'frio';
  const expensiveAuds = ((curM.original && curM.original[expensiveKey].audiences) || []).filter((a) => a.name && a.messages > 0 && a.costPerMsg > 0);
  const cheaperAuds = ((curM.original && curM.original[cheaperKey].audiences) || []).filter((a) => a.name && a.messages > 0 && a.costPerMsg > 0);

  // REDUZIR: ordena por custo/msg DESC (pior primeiro), pega 3 com gasto relevante (>5% do canal caro)
  const reduceAuds = expensiveAuds
    .map((a) => ({ ...a, spent: a.messages * a.costPerMsg }))
    .filter((a) => a.spent >= expensiveInv * 0.03) // só públicos com pelo menos 3% do canal
    .sort((x, y) => y.costPerMsg - x.costPerMsg)
    .slice(0, 3);

  // AUMENTAR: ordena por custo/msg ASC (melhor primeiro), pega 3 com volume mínimo
  const increaseAuds = cheaperAuds
    .map((a) => ({ ...a, spent: a.messages * a.costPerMsg }))
    .filter((a) => a.messages >= 15) // tem volume suficiente pra suportar mais verba
    .sort((x, y) => x.costPerMsg - y.costPerMsg)
    .slice(0, 3);

  // Distribuição do moveAmount: tira proporcional ao gasto dos reduceAuds, coloca proporcional ao volume dos increaseAuds
  const totalReduceSpent = reduceAuds.reduce((s, a) => s + a.spent, 0);
  const reduceWithAmount = reduceAuds.map((a) => ({
    name: a.name,
    currentSpent: a.spent,
    currentCostPerMsg: a.costPerMsg,
    messages: a.messages,
    moveAmount: totalReduceSpent > 0 ? (a.spent / totalReduceSpent) * moveAmount : 0,
  }));

  const totalIncreaseMsgs = increaseAuds.reduce((s, a) => s + a.messages, 0);
  const increaseWithAmount = increaseAuds.map((a) => ({
    name: a.name,
    currentSpent: a.spent,
    currentCostPerMsg: a.costPerMsg,
    messages: a.messages,
    moveAmount: totalIncreaseMsgs > 0 ? (a.messages / totalIncreaseMsgs) * moveAmount : 0,
  }));

  return {
    fromChannel: expensiveChannel,
    toChannel: cheaperChannel,
    amount: moveAmount,
    movePct,
    extraLeads,
    efficiency,
    cheaperCPL: cheaper,
    expensiveCPL,
    reduceAuds: reduceWithAmount,
    increaseAuds: increaseWithAmount,
  };
};

// ============ ANALYTICS · SATURATION ============
const detectSaturation = (curMonth, prevMonth) => {
  if (!curMonth || !prevMonth) return [];
  const result = [];
  for (const channel of ['remarketing', 'frio']) {
    const curAud = curMonth[channel].audiences || [];
    const prevAud = prevMonth[channel].audiences || [];
    for (const a of curAud) {
      if (!a.name || !a.costPerMsg) continue;
      const match = prevAud.find((p) => normalize(p.name) === normalize(a.name));
      if (!match || !match.costPerMsg) continue;
      const change = (a.costPerMsg - match.costPerMsg) / match.costPerMsg;
      if (change >= 0.25) {
        result.push({ channel, name: a.name, prevCost: match.costPerMsg, curCost: a.costPerMsg, change });
      }
    }
  }
  return result.sort((a, b) => b.change - a.change);
};

// ============ ANALYTICS · PARETO ============
const paretoAudiences = (curMonth) => {
  if (!curMonth) return null;
  const all = [];
  for (const channel of ['remarketing', 'frio']) {
    for (const a of curMonth[channel].audiences || []) {
      const spent = (Number(a.messages) || 0) * (Number(a.costPerMsg) || 0);
      if (spent > 0 && a.name) {
        all.push({ name: a.name, channel, spent, messages: a.messages, costPerMsg: a.costPerMsg });
      }
    }
  }
  if (all.length === 0) return null;
  all.sort((a, b) => b.spent - a.spent);
  const total = all.reduce((s, x) => s + x.spent, 0);
  let acc = 0;
  let count80 = 0;
  for (let i = 0; i < all.length; i++) {
    acc += all[i].spent;
    if (acc / total >= 0.8) { count80 = i + 1; break; }
  }
  if (count80 === 0) count80 = all.length;
  return { all, total, top80Count: count80, top80Pct: count80 / all.length };
};

// ============ CSV PARSER + META ADS IMPORTER ============
// Parser CSV robusto: lida com BOM, delimitadores comuns (',' ';' '\t'), aspas escapadas.
const parseCSV = (text) => {
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  // Detect delimiter na primeira linha (vence o mais comum)
  const firstLine = text.split(/\r?\n/)[0] || '';
  const counts = { ',': 0, ';': 0, '\t': 0 };
  let q = false;
  for (const ch of firstLine) {
    if (ch === '"') q = !q;
    else if (!q && counts[ch] !== undefined) counts[ch]++;
  }
  const delim = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  const rows = [];
  let row = [];
  let cell = '';
  let inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"' && text[i + 1] === '"') { cell += '"'; i++; }
      else if (ch === '"') inQuote = false;
      else cell += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === delim) { row.push(cell); cell = ''; }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (ch === '\r') { /* skip */ }
      else cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows.filter((r) => r.some((c) => c && c.trim()));
};

// Parse number that may be in BR format (R$ 1.234,56) or EN (1234.56 / 1,234.56)
const parseNum = (val) => {
  if (val === null || val === undefined || val === '') return 0;
  let s = String(val).trim().replace(/^R\$\s*/i, '').replace(/\s/g, '');
  if (!s) return 0;
  const hasComma = s.includes(',');
  const hasDot = s.includes('.');
  if (hasComma && hasDot) {
    // both — assume thousand=dot, decimal=comma (BR)
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (hasComma) {
    // only comma — likely decimal separator in BR
    s = s.replace(',', '.');
  }
  // only dot or neither — leave as-is
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

// Detect each useful column by header pattern (PT-BR + EN variations)
const detectMetaColumns = (headers) => {
  const lower = headers.map((h) => (h || '').trim().toLowerCase());
  const find = (patterns) => {
    for (let i = 0; i < lower.length; i++) {
      for (const p of patterns) if (p.test(lower[i])) return i;
    }
    return -1;
  };
  return {
    // audienceName precisa ser específico — "nome do conjunto" / "ad set name" / "público personalizado"
    // (evita falso match em "Orçamento do conjunto de anúncios")
    audienceName: find([/^nome do conjunto/i, /^ad ?set ?name$/i, /^ad ?set$/i, /^p[uú]blico personalizado/i, /^p[uú]blico$/i, /^audi[eê]ncia$/i, /^audience ?name$/i]),
    campaignName: find([/^nome da campanha/i, /^campanha$/i, /^campaign ?name$/i, /^campaign$/i]),
    spent: find([/^valor usado/i, /^valor gasto/i, /^amount spent/i, /^spend$/i, /^gasto$/i, /^custo total/i, /^cost$/i]),
    results: find([/^resultados$/i, /^results$/i, /^conversas? iniciadas?/i, /^messaging conversations/i]),
    costPerResult: find([/^custo por resultados?$/i, /^cost per results?$/i, /^custo por conversa/i, /^cost per messaging/i]),
    resultIndicator: find([/^indicador de resultados?/i, /^result indicator/i, /^result type/i]),
    impressions: find([/^impress[oõ]es/i, /^impressions/i]),
    reach: find([/^alcance/i, /^reach/i]),

    cpc: find([/^cpc \(custo por clique no link/i, /^cpc \(cost per link/i, /^cpc$/i]),

// Normaliza um telefone para os últimos 8 dígitos (ignora DDD e nono dígito).
// Ex.: "62 8200-1112" → "82001112"; "+55 62 98200-1112" → "82001112"
const normalizePhone = (s) => {
  if (!s) return '';
  const digits = String(s).replace(/\D/g, '');
  return digits.slice(-8);
};

// Detecta qual vendedora "possui" um público pelo nome do conjunto.
// Match por: (1) keyword textual do nome dela; (2) número de telefone (tolerante a formato).
const detectContact = (audienceName, contacts) => {
  if (!audienceName || !contacts || !contacts.length) return null;
  const upper = audienceName.toUpperCase();
  const stripAccents = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const flat = stripAccents(upper);
  const audDigits = audienceName.replace(/\D/g, '');
  for (const contact of contacts) {
    // (1) keyword textual
    const keywords = contact.keywords || [contact.name];
    for (const kw of keywords) {
      const kwFlat = stripAccents(String(kw).toUpperCase());
      if (kwFlat && flat.includes(kwFlat)) return contact.name;
    }
    // (2) telefone
    for (const phone of (contact.phones || [])) {
      const phoneNorm = normalizePhone(phone);
      if (phoneNorm && audDigits.includes(phoneNorm)) return contact.name;
    }
  }
  return null;
};

// Classifica uma linha como remarketing / frio / feed / skip
// Prioridade: (1) Indicador de resultados (sinal forte do Meta) → (2) padrão de nomes Loretto → (3) heurísticas gerais
const classifyRow = (rowData, contacts) => {
  const name = (rowData.audienceName || rowData.campaignName || '').trim();
  if (!name) return 'skip';
  const norm = normalize(name);
  const upper = name.toUpperCase();

  // 1. Match exato com config de contatos
  for (const contact of (contacts || [])) {
    for (const r of (contact.remarketing || [])) if (normalize(r) === norm) return 'remarketing';
    for (const f of (contact.frio || [])) if (normalize(f) === norm) return 'frio';
  }

  // 2. Indicador de resultados (sinal MAIS forte — vem do Meta)
  const indicator = (rowData.resultIndicator || '').toLowerCase();
  const isMessaging = /messaging_conversation|conversa_iniciada|onsite_conversion\.messaging/.test(indicator);
  const isPostEngagement = /post_engagement/.test(indicator);
  const isProfileVisit = /profile_visit|page_view/.test(indicator);
  const isPageFollow = /page_follow|page_like|follow/.test(indicator);
  const isLinkClick = /link_click|landing_page/.test(indicator);
  const isLead = /lead/.test(indicator);

  if (isPostEngagement || isProfileVisit || isPageFollow) return 'feed';
  if (isMessaging) {
    // É WhatsApp — decide rem vs frio pelo nome
    // ENGAJAMENT N D (público quente), LISTA DE CLIENTES, RMKT, RECOMPRA → remarketing
    if (/\bENGAJAMENT\w*\b.*\d+\s*D\b|\bENGAJAMENT\w*\s*\d+\s*D\b|\[RMKT\]|\bRMKT\b|REMARKETING|RECOMPRA|RETARGET|LISTA DE CLIENTES/.test(upper)) return 'remarketing';
    return 'frio';
  }
  if (isLead) return 'frio';

  // 3. Padrão de nomes Loretto (fallback se Indicador não disponível)
  const isMsgCampaign = /\[CAMPANHA DE MSG\]|\[MSG\]|\[CAMPANHA DE MENSAGEM\]|\[MENSAGEM\b/.test(upper);
  const isFollowersCampaign = /\[CAMPANHA DE SEGUIDORES\]|\[SEGUIDORES\b|\[CAMPANHA DE VISITA AO PERFIL\]|\[VISITA AO PERFIL\]|\[SEGUIDORES FEED\]|\[CAMPANHA PERFIL/.test(upper);
  const isEngagementPost = /^POST DO INSTAGRAM|^PUBLICAÇÃO DO INSTAGRAM|^PUBLICACAO DO INSTAGRAM|NOVA CAMPANHA DE ENGAJAMENTO/.test(upper);
  const isLeadCampaign = /\[CAMPANHA DE LEAD\]|\[LEAD\]/.test(upper);

  if (isMsgCampaign) {
    const isRMKT = /\[RMKT\]|\bRMKT\b|REMARKETING|RECOMPRA|RETARGET|\bENGAJAMENT\w*\b.*\d+\s*D\b|\bENGAJAMENT\w*\s*\d+\s*D\b/.test(upper);
    return isRMKT ? 'remarketing' : 'frio';
  }
  if (isFollowersCampaign || isEngagementPost) return 'feed';
  if (isLeadCampaign) return 'frio';

  // 4. Heurísticas finais (sem indicador, sem tags claras)
  if (/\bENGAJAMENT\w*\b.*\d+\s*D\b|\bENGAJAMENT\w*\s*\d+\s*D\b/.test(upper)) return 'remarketing';
  if (/COMPORTAMENT|INTERESSES?|PROFISSOES|MABERTO|CONDOMINIO|LOOKALIKE|AUTORIDADE|DEMOGRAF|PROSPEC/.test(upper)) return 'frio';
  if (/\brem(arketing)?\b|^rem\s|comprador|engaj|vip|recompra/i.test(name)) return 'remarketing';
  if (/reels|catalog|awareness|tr[aá]fego|stories|alcance|impress|^feed$|seguidor/i.test(name)) return 'feed';

  if (isLinkClick) return 'feed';
  return 'skip';
};

// Constrói o objeto de mês a partir das linhas classificadas
const buildMonthFromCSV = (rows) => {
  const month = emptyMonth();
  month.remarketing.audiences = [];
  month.frio.audiences = [];
  month.perfilTraffic.campaigns = [];

  let remInv = 0, frioInv = 0;
  let remLeadsTotal = 0, frioLeadsTotal = 0;

  for (const r of rows) {
    if (r.classification === 'skip') continue;
    const spent = r.spent || 0;
    const results = r.results || 0;
    const costPerResult = r.costPerResult || (results > 0 ? spent / results : 0);

    if (r.classification === 'remarketing') {
      remInv += spent;
      remLeadsTotal += results; // aqui results = conversas iniciadas (proxy de leads)
      month.remarketing.audiences.push({
        name: r.audienceName || r.campaignName || '(sem nome)',
        messages: results,
        costPerMsg: costPerResult,
      });
    } else if (r.classification === 'frio') {
      frioInv += spent;
      frioLeadsTotal += results;
      month.frio.audiences.push({
        name: r.audienceName || r.campaignName || '(sem nome)',
        messages: results,
        costPerMsg: costPerResult,
      });
    } else if (r.classification === 'feed') {
      month.perfilTraffic.campaigns.push({
        name: r.campaignName || r.audienceName || '(sem nome)',
        cost: spent,
        results: results,
      });
    }
  }

  month.remarketing.investment = remInv;
  month.frio.investment = frioInv;
  month.remarketing.leads = remLeadsTotal;
  month.frio.leads = frioLeadsTotal;
  // perfilNumbers (impressões/visitas/seguidores) não vêm do Meta Ads — manter zerados, gestor preenche depois

  // garantir pelo menos 1 entrada vazia em cada array
  if (!month.remarketing.audiences.length) month.remarketing.audiences = [{ name: '', messages: 0, costPerMsg: 0 }];
  if (!month.frio.audiences.length) month.frio.audiences = [{ name: '', messages: 0, costPerMsg: 0 }];
  if (!month.perfilTraffic.campaigns.length) month.perfilTraffic.campaigns = [{ name: '', cost: 0, results: 0 }];

  return month;
};

// ============ ANALYTICS · DISTRIBUIÇÃO POR CONTATO ============
// Cruza a config de contatos (em goals.contacts) com os públicos do mês.
// Cada contato é dono de públicos específicos — os leads daquele público vão
// inteiros pra ele. Como a estrutura atual não tem leads por público, fazemos
// rateio proporcional ao volume de mensagens.
// Cruza públicos do mês com os contatos via keyword matching (nome da vendedora dentro do nome do conjunto).
// Cada contato recebe os públicos que contêm sua keyword. Leads são rateados proporcionalmente
// às mensagens dentro de cada canal.
const getContactPerformance = (curMonth, contacts) => {
  if (!curMonth || !contacts || !contacts.length) return [];

  const remTotalMsgs = (curMonth.remarketing.audiences || []).reduce((s, a) => s + (Number(a.messages) || 0), 0);
  const frioTotalMsgs = (curMonth.frio.audiences || []).reduce((s, a) => s + (Number(a.messages) || 0), 0);
  const remTotalLeads = Number(curMonth.remarketing.leads) || 0;
  const frioTotalLeads = Number(curMonth.frio.leads) || 0;

  // Inicializa cada contato com bucket vazio + bucket "(sem contato)" para os órfãos
  const buckets = {};
  for (const c of contacts) buckets[c.name] = { name: c.name, audiences: [], totalMsgs: 0, totalSpent: 0, totalLeadsExact: 0 };
  buckets['(sem vendedora)'] = { name: '(sem vendedora)', audiences: [], totalMsgs: 0, totalSpent: 0, totalLeadsExact: 0 };

  const processAudiences = (audList, channelName, channelTotalMsgs, channelTotalLeads) => {
    for (const a of (audList || [])) {
      if (!a.name) continue;
      const owner = detectContact(a.name, contacts) || '(sem vendedora)';
      const msgs = Number(a.messages) || 0;
      const cpm = Number(a.costPerMsg) || 0;
      const spent = msgs * cpm;
      const leads = channelTotalMsgs > 0 ? (msgs / channelTotalMsgs) * channelTotalLeads : 0;
      const costPerLead = leads > 0 ? spent / leads : 0;
      buckets[owner].audiences.push({ name: a.name, channel: channelName, messages: msgs, costPerMsg: cpm, spent, leads, costPerLead });
      buckets[owner].totalMsgs += msgs;
      buckets[owner].totalSpent += spent;
      buckets[owner].totalLeadsExact += leads;
    }
  };

  processAudiences(curMonth.remarketing.audiences, 'remarketing', remTotalMsgs, remTotalLeads);
  processAudiences(curMonth.frio.audiences, 'frio', frioTotalMsgs, frioTotalLeads);

  return Object.values(buckets)
    .map((b) => ({
      ...b,
      totalLeads: Math.round(b.totalLeadsExact),
      avgCostPerLead: b.totalLeadsExact > 0 ? b.totalSpent / b.totalLeadsExact : 0,
      avgCostPerMsg: b.totalMsgs > 0 ? b.totalSpent / b.totalMsgs : 0,
    }))
    // Esconde o bucket "(sem vendedora)" se estiver vazio; senão mostra
    .filter((b) => b.name !== '(sem vendedora)' || b.audiences.length > 0);
};

    .slice(0, 5);
};

const detectCampaignSaturation = (curMonth, prevMonth) => {
  if (!curMonth || !prevMonth) return [];
  const result = [];
  const curCamps = curMonth.perfilTraffic.campaigns || [];
  const prevCamps = prevMonth.perfilTraffic.campaigns || [];
  for (const c of curCamps) {
    if (!c.name || !c.cost || !c.results) continue;
    const match = prevCamps.find((p) => normalize(p.name) === normalize(c.name));
    if (!match || !match.cost || !match.results) continue;
    const curCPR = c.cost / c.results;
    const prevCPR = match.cost / match.results;
    const change = (curCPR - prevCPR) / prevCPR;
    if (change >= 0.25) {
      result.push({ name: c.name, prevCost: prevCPR, curCost: curCPR, change });
    }
  }
  return result.sort((a, b) => b.change - a.change);
};

const paretoCampaigns = (curMonth) => {
  if (!curMonth) return null;
  const all = (curMonth.perfilTraffic.campaigns || [])
    .filter((c) => c.name && c.cost > 0)
    .map((c) => ({ name: c.name, spent: c.cost, results: c.results || 0 }));
  if (all.length === 0) return null;
  all.sort((a, b) => b.spent - a.spent);
  const total = all.reduce((s, x) => s + x.spent, 0);
  let acc = 0;
  let count80 = 0;
  for (let i = 0; i < all.length; i++) {
    acc += all[i].spent;
    if (acc / total >= 0.8) { count80 = i + 1; break; }
  }
  if (count80 === 0) count80 = all.length;
  return { all, total, top80Count: count80, top80Pct: count80 / all.length };
};

// ============ DELTA BADGE ============
const DeltaBadge = ({ current, previous, inverse = false, format = 'number' }) => {
  if (!previous || previous === 0) {
    if (!current) return <span className="ls-delta-neutral">—</span>;
    return <span className="ls-delta-neutral">novo</span>;
  }
  const diff = current - previous;
  const pct = diff / previous;
  const isUp = diff > 0;
  const isGood = inverse ? !isUp : isUp;
  const sign = isUp ? '+' : '';
  let absText;
  if (format === 'currency') absText = `${sign}${fmtBRL(diff)}`;
  else if (format === 'currencyHi') absText = `${sign}${fmtBRLCusto(diff)}`;
  else absText = `${sign}${fmtInt(diff)}`;
  return (
    <div className={`ls-delta ${diff === 0 ? 'ls-delta-neutral' : isGood ? 'ls-delta-pos' : 'ls-delta-neg'}`}>
      {diff === 0 ? <Minus size={10} /> : isUp ? <TrendingUp size={10} /> : <TrendingDown size={10} />}
      <span className="ls-delta-pct">{diff === 0 ? '0,0%' : fmtPct(Math.abs(pct))}</span>
      <span className="ls-delta-abs">{absText}</span>
    </div>
  );
};

// ============ PROGRESS BAR ============
const ProgressBar = ({ current, goal, inverse = false, accent = BRAND.gold }) => {
  if (!goal) return null;
  const pct = current / goal;
  const display = Math.min(pct, 1);
  let status = 'ok';
  if (inverse) {
    if (current > goal) status = 'over';
    else if (current > goal * 0.85) status = 'warn';
  } else {
    if (pct >= 1) status = 'over';
    else if (pct < 0.5) status = 'low';
  }
  const color = status === 'over' && !inverse ? BRAND.positive
    : status === 'over' && inverse ? BRAND.negative
    : status === 'warn' ? BRAND.warning
    : status === 'low' ? BRAND.warning
    : accent;
  return (
    <div className="ls-progress">
      <div className="ls-progress-track"><div className="ls-progress-fill" style={{ width: `${display * 100}%`, background: color }} /></div>
      <div className="ls-progress-label">
        <span style={{ color }}>{fmtPctSimple(pct)}</span> da meta
      </div>
    </div>
  );
};

const ImportCSVModal = ({ targetMonth, currentMonths, contacts, onSave, onClose }) => {
  const [stage, setStage] = useState('upload'); // upload | preview | done
  const [filename, setFilename] = useState('');
  const [rawRows, setRawRows] = useState([]); // parsed rows from CSV
  const [classifiedRows, setClassifiedRows] = useState([]);
  const [inactiveCount, setInactiveCount] = useState(0); // anúncios arquivados/inativos sem gasto que foram ignorados
  const [destinationMonth, setDestinationMonth] = useState(targetMonth);
  const [mergeMode, setMergeMode] = useState('replace');
  const [error, setError] = useState('');

  const handleFile = (file) => {
    if (!file) return;
    setFilename(file.name);
    setError('');
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const rows = parseCSV(text);
        if (rows.length < 2) { setError('CSV vazio ou inválido — verifique se há cabeçalho e ao menos uma linha.'); return; }
        const headers = rows[0];
        const cols = detectMetaColumns(headers);
        const dataRows = rows.slice(1);
        const allParsed = dataRows.map((row) => ({
          audienceName: cols.audienceName >= 0 ? (row[cols.audienceName] || '').trim() : '',
          campaignName: cols.campaignName >= 0 ? (row[cols.campaignName] || '').trim() : '',
          spent: cols.spent >= 0 ? parseNum(row[cols.spent]) : 0,
          results: cols.results >= 0 ? parseNum(row[cols.results]) : 0,
          costPerResult: cols.costPerResult >= 0 ? parseNum(row[cols.costPerResult]) : 0,
          resultIndicator: cols.resultIndicator >= 0 ? (row[cols.resultIndicator] || '') : '',
          impressions: cols.impressions >= 0 ? parseNum(row[cols.impressions]) : 0,
          reach: cols.reach >= 0 ? parseNum(row[cols.reach]) : 0,
          clicks: cols.clicks >= 0 ? parseNum(row[cols.clicks]) : 0,
          placement: cols.placement >= 0 ? (row[cols.placement] || '') : '',
          objective: cols.objective >= 0 ? (row[cols.objective] || '') : '',
          _rawRow: row,
        })).filter((r) => r.audienceName || r.campaignName || r.spent > 0);

        // ━━━ FILTRO DE RUÍDO ━━━
        // Anúncios arquivados/inativos SEM gasto vêm no CSV mas são lixo (públicos antigos que não rodaram).
        // Filtramos antes de mostrar pro usuário pra evitar 200+ linhas "skip" no preview.
        const isInactive = (placement) => {
          const p = (placement || '').toLowerCase();
          return p === 'archived' || p === 'inactive' || p === 'not_delivering';
        };
        const inactiveIgnored = allParsed.filter((r) => isInactive(r.placement) && r.spent === 0 && r.results === 0);
        const parsed = allParsed.filter((r) => !(isInactive(r.placement) && r.spent === 0 && r.results === 0));

        if (parsed.length === 0) {
          setError('Nenhuma linha válida encontrada. Verifique se o CSV foi exportado com Detalhamento por Públicos e tem as colunas necessárias (Valor gasto, Resultados, Conjunto de Anúncios).');
          return;
        }

        const classified = parsed.map((p) => {
          // Linhas com gasto E resultado zerados são automaticamente marcadas como "ignorar"
          // (campanhas pausadas/inativas no Meta), mas continuam visíveis e o usuário pode reativar
          if (p.spent === 0 && p.results === 0) return { ...p, classification: 'skip' };
          return { ...p, classification: classifyRow(p, contacts) };
        });
        setRawRows(parsed);
        setClassifiedRows(classified);
        setInactiveCount(inactiveIgnored.length);
        setStage('preview');
      } catch (err) {
        setError('Falha ao processar o arquivo: ' + err.message);
      }
    };
    reader.onerror = () => setError('Falha na leitura do arquivo.');
    reader.readAsText(file, 'UTF-8');
  };

  const updateClassification = (idx, newClass) => {
    setClassifiedRows((rows) => rows.map((r, i) => i === idx ? { ...r, classification: newClass } : r));
  };

  const handleImport = () => {
    const newMonthData = buildMonthFromCSV(classifiedRows);
    if (mergeMode === 'merge' && currentMonths[destinationMonth]) {
      const existing = currentMonths[destinationMonth];
      newMonthData.remarketing.audiences = [...(existing.remarketing.audiences || []).filter((a) => a.name || a.messages), ...newMonthData.remarketing.audiences.filter((a) => a.name)];
      newMonthData.frio.audiences = [...(existing.frio.audiences || []).filter((a) => a.name || a.messages), ...newMonthData.frio.audiences.filter((a) => a.name)];
      newMonthData.perfilTraffic.campaigns = [...(existing.perfilTraffic.campaigns || []).filter((c) => c.name || c.cost), ...newMonthData.perfilTraffic.campaigns.filter((c) => c.name)];
      newMonthData.remarketing.investment += Number(existing.remarketing.investment) || 0;
      newMonthData.frio.investment += Number(existing.frio.investment) || 0;
      newMonthData.remarketing.leads += Number(existing.remarketing.leads) || 0;
      newMonthData.frio.leads += Number(existing.frio.leads) || 0;
      // mantém perfilNumbers existentes
      newMonthData.perfilNumbers = { ...existing.perfilNumbers };
    }
    onSave(destinationMonth, newMonthData);
  };

  const stats = useMemo(() => {
    const s = { remarketing: 0, frio: 0, feed: 0, skip: 0, totalSpent: 0, totalResults: 0 };
    for (const r of classifiedRows) {
      s[r.classification] = (s[r.classification] || 0) + 1;
      if (r.classification !== 'skip') {
        s.totalSpent += r.spent;
        s.totalResults += r.results;
      }
    }
    return s;
  }, [classifiedRows]);

  // Build month options (24 months around target)
  const monthOpts = useMemo(() => {
    const set = new Set(Object.keys(currentMonths || {}));
    const today = new Date();
    for (let i = -2; i < 24; i++) {
      const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
      set.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    }
    return Array.from(set).sort().reverse();
  }, [currentMonths]);

  return (
    <div className="ls-modal-overlay" onClick={onClose}>
      <div className="ls-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 1100 }}>
        <div className="ls-modal-head">
          <div>
            <div className="ls-modal-eyebrow">— Importação —</div>
            <h2 className="ls-modal-title">CSV do Meta Ads</h2>
          </div>
          <button className="ls-icon-btn" onClick={onClose}><X size={18} /></button>
        </div>
        <div className="ls-modal-body">

const EditModal = ({ monthKey, data, onSave, onClose, onDelete, hasData }) => {

  const updateField = (path, value) => {
    setDraft((d) => {
      const next = JSON.parse(JSON.stringify(d));
      const parts = path.split('.');
      let cur = next;
      for (let i = 0; i < parts.length - 1; i++) {
        const k = parts[i];
        const arr = k.match(/^(\w+)\[(\d+)\]$/);
        if (arr) cur = cur[arr[1]][parseInt(arr[2])];
        else cur = cur[k];
      }
      cur[parts[parts.length - 1]] = value;
      return next;
    });
  };
  const addAud = (ch) => setDraft((d) => { const n = JSON.parse(JSON.stringify(d)); n[ch].audiences.push({ name: '', messages: 0, costPerMsg: 0 }); return n; });
  const rmAud = (ch, i) => setDraft((d) => { const n = JSON.parse(JSON.stringify(d)); n[ch].audiences.splice(i, 1); if (!n[ch].audiences.length) n[ch].audiences.push({ name: '', messages: 0, costPerMsg: 0 }); return n; });

// ============ DRILL TABLE ============
const DrillTable = ({ items = [], kind = 'audience' }) => {
  const filtered = items.filter((it) => it.name || (kind === 'audience' ? it.messages > 0 : it.cost > 0 || it.results > 0));
  // Sort state: 'msg-desc' (default), 'cost-desc', 'cost-asc', 'total-desc', 'name-asc' etc.
  const defaultSort = kind === 'audience' ? 'msg-desc' : 'cost-desc';
  const [sort, setSort] = useState(defaultSort);

  if (filtered.length === 0) return <div className="ls-drill-empty">Nenhum {kind === 'audience' ? 'público' : 'campanha'} lançado neste mês</div>;

  const toggleSort = (col, defaultDir = 'desc') => {
    const [curCol, curDir] = sort.split('-');
    if (curCol === col) {
      setSort(`${col}-${curDir === 'desc' ? 'asc' : 'desc'}`);
    } else {
      setSort(`${col}-${defaultDir}`);
    }
  };

  const sorted = [...filtered].sort((a, b) => {
    const [col, dir] = sort.split('-');
    const mul = dir === 'desc' ? -1 : 1;
    if (kind === 'audience') {
      if (col === 'name')  return mul * String(a.name || '').localeCompare(String(b.name || ''));
      if (col === 'msg')   return mul * ((Number(a.messages) || 0) - (Number(b.messages) || 0));
      if (col === 'cost')  return mul * ((Number(a.costPerMsg) || 0) - (Number(b.costPerMsg) || 0));
      if (col === 'total') return mul * (((Number(a.messages)||0)*(Number(a.costPerMsg)||0)) - ((Number(b.messages)||0)*(Number(b.costPerMsg)||0)));
    } else {
      if (col === 'name')   return mul * String(a.name || '').localeCompare(String(b.name || ''));
      if (col === 'cost')   return mul * ((Number(a.cost) || 0) - (Number(b.cost) || 0));
      if (col === 'result') return mul * ((Number(a.results) || 0) - (Number(b.results) || 0));
      if (col === 'cpr') {
        const ar = Number(a.results) > 0 ? Number(a.cost) / Number(a.results) : Infinity;
        const br = Number(b.results) > 0 ? Number(b.cost) / Number(b.results) : Infinity;
        return mul * (ar - br);
      }
    }
    return 0;
  });

  const arrow = (col) => {
    const [curCol, curDir] = sort.split('-');
    if (curCol !== col) return <span className="ls-sort-arrow ls-sort-inactive">⇅</span>;
    return <span className="ls-sort-arrow ls-sort-active">{curDir === 'desc' ? '↓' : '↑'}</span>;
  };

  return (
    <table className="ls-drill-table ls-drill-table-sortable">
      <thead>
        <tr>
          {kind === 'audience' ? <>
            <th onClick={() => toggleSort('name', 'asc')} className="ls-th-sortable">Público {arrow('name')}</th>
            <th onClick={() => toggleSort('msg', 'desc')} className="ls-th-sortable">Msg {arrow('msg')}</th>
            <th onClick={() => toggleSort('cost', 'desc')} className="ls-th-sortable">R$ / msg {arrow('cost')}</th>
            <th onClick={() => toggleSort('total', 'desc')} className="ls-th-sortable">Total {arrow('total')}</th>
          </> : <>
            <th onClick={() => toggleSort('name', 'asc')} className="ls-th-sortable">Campanha {arrow('name')}</th>
            <th onClick={() => toggleSort('cost', 'desc')} className="ls-th-sortable">Custo {arrow('cost')}</th>
            <th onClick={() => toggleSort('result', 'desc')} className="ls-th-sortable">Result. {arrow('result')}</th>
            <th onClick={() => toggleSort('cpr', 'desc')} className="ls-th-sortable">R$ / res. {arrow('cpr')}</th>
          </>}
        </tr>
      </thead>
      <tbody>
        {sorted.map((it, i) => (
          <tr key={i}>
            <td>{it.name || `(sem nome) ${i+1}`}</td>
            {kind === 'audience' ? <>
              <td>{fmtInt(it.messages)}</td>
              <td>{fmtBRLCusto(it.costPerMsg)}</td>
              <td>{fmtBRL((Number(it.messages)||0) * (Number(it.costPerMsg)||0))}</td>
            </> : <>
              <td>{fmtBRL(it.cost)}</td>
              <td>{fmtInt(it.results)}</td>
              <td>{(Number(it.results)||0) > 0 ? fmtBRLCusto((Number(it.cost)||0)/(Number(it.results)||1)) : '—'}</td>
            </>}
          </tr>
        ))}
      </tbody>
    </table>
  );
};

// ============ EXECUTIVE SUMMARY GENERATOR ============
const buildSummaryText = (curMonth, prevMonth, curM, prevM, goals, forecast, recommendation, anomalies, monthKey) => {
  if (!curM) return '';
  const lines = [];
  lines.push(`📊 *LORETTO SCARPA · Tráfego Pago*`);
  lines.push(`🗓️ ${monthLabel(monthKey)}`);
  lines.push('');
  lines.push('💰 *INVESTIMENTO*');
  lines.push(`Total: ${fmtBRL(curM.totalInvAll)}`);
  if (prevM) {
    const diff = curM.totalInvAll - prevM.totalInvAll;
    const pct = prevM.totalInvAll > 0 ? diff / prevM.totalInvAll : 0;
    lines.push(`vs mês anterior: ${diff >= 0 ? '+' : ''}${fmtBRL(diff)} (${fmtPct(pct)})`);
  }
  lines.push(`• Remarketing: ${fmtBRL(curM.remInv)}`);
  lines.push(`• Frio: ${fmtBRL(curM.frioInv)}`);
  lines.push(`• Perfil: ${fmtBRL(curM.perfilInv)}`);
  lines.push('');
  lines.push('👥 *LEADS · WhatsApp*');
  lines.push(`Total: ${fmtInt(curM.totalLeads)} ${prevM ? `(${curM.totalLeads >= prevM.totalLeads ? '+' : ''}${fmtPct((curM.totalLeads - prevM.totalLeads) / Math.max(1, prevM.totalLeads))})` : ''}`);
  lines.push(`Custo médio/lead: ${fmtBRL(curM.avgCostLeadTotal)}`);
  lines.push('');
  lines.push('📱 *PERFIL INSTAGRAM*');
  lines.push(`Visualizações: ${fmtInt(curM.impressions)}`);
  if (curM.reach > 0) lines.push(`Alcance: ${fmtInt(curM.reach)}`);
  lines.push(`Visitas: ${fmtInt(curM.visits)}`);
  lines.push(`Novos seguidores: ${fmtInt(curM.newFollowers)}`);
  if (goals) {
    lines.push('');
    lines.push('🎯 *METAS*');
    lines.push(`Leads: ${fmtInt(curM.totalLeads)}/${fmtInt(goals.leadsMonthly)} (${fmtPctSimple(curM.totalLeads / goals.leadsMonthly)})`);
    lines.push(`Investimento: ${fmtBRL0(curM.totalInvAll)}/${fmtBRL0(goals.investmentMonthly)} (${fmtPctSimple(curM.totalInvAll / goals.investmentMonthly)})`);
    lines.push(`Custo/lead vs teto: ${fmtBRL(curM.avgCostLeadTotal)} / max ${fmtBRL(goals.costLeadMax)}`);
    lines.push(`Seguidores: ${fmtInt(curM.newFollowers)}/${fmtInt(goals.followersMonthly)} (${fmtPctSimple(curM.newFollowers / goals.followersMonthly)})`);
  }
  if (forecast?.leads) {
    lines.push('');
    lines.push('🔮 *PREVISÃO PRÓXIMO MÊS*');
    lines.push(`Leads esperados: ~${fmtInt(forecast.leads.value)} (entre ${fmtInt(forecast.leads.low)} e ${fmtInt(forecast.leads.high)})`);
    lines.push(`Investimento projetado: ${fmtBRL0(forecast.investment.value)}`);
  }
  if (anomalies && anomalies.length > 0) {
    lines.push('');
    lines.push('⚠️ *ALERTAS*');
    anomalies.slice(0, 4).forEach((a) => lines.push(`• ${a.text}`));
  }
  if (recommendation) {
    lines.push('');
    lines.push('💡 *RECOMENDAÇÃO*');
    lines.push(`Mover ${fmtBRL0(recommendation.amount)} de ${recommendation.fromChannel} para ${recommendation.toChannel}.`);
    lines.push(`Estimativa: +${fmtInt(recommendation.extraLeads)} leads com mesmo orçamento total.`);
  }
  lines.push('');
  lines.push('—');
  lines.push('Unidos pelo Propósito.');
  return lines.join('\n');
};

const App = () => {
  const [months, setMonths] = useState({});

  const [copied, setCopied] = useState(false);
  // Perfil ativo (apenas pra rastrear "quem editou" — sem auth real)
  const [currentProfile, setCurrentProfile] = useState(() => {
    try {
      const savedId = localStorage.getItem('ls_profile_id');
      return PROFILES.find((p) => p.id === savedId) || PROFILES[0];
    } catch { return PROFILES[0]; }
  });
  const handleProfileChange = (profile) => {
    setCurrentProfile(profile);
    try { localStorage.setItem('ls_profile_id', profile.id); } catch (e) {}
  };
  // Status da sincronização com a nuvem: 'connecting' | 'synced' | 'saving' | 'offline' | 'error'
  const [cloudStatus, setCloudStatus] = useState('connecting');
  const [lastSyncAt, setLastSyncAt] = useState(null);
  const saveTimerRef = useRef(null);
  const ignoreNextSnapshotRef = useRef(false);
  // Hash do último payload que ENVIAMOS pro Firestore — usado pra detectar "eco" da nossa própria escrita
  // (Firestore pode disparar 2 snapshots: cache local + confirmação do servidor, o flag bool perde o segundo)
  const justSavedHashRef = useRef('');


  // ========== LOAD: lê primeiro do localStorage (instantâneo), depois Firestore (autoritativo) ==========
  useEffect(() => {
    let unsubscribe = null;
    // Safety timer: se em 5s o Firestore não responder, libera a tela mesmo assim
    const safetyTimer = setTimeout(() => {
      console.warn('[LS-DASH] Firestore load timeout — proceeding with cache only');
      setLoaded(true);
      setCloudStatus('offline');
    }, 5000);
    (async () => {
      // 1. Cache local primeiro (carrega rápido se já houver algo salvo)
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r?.value) {
          const p = JSON.parse(r.value);
          if (p.months) setMonths(p.months);
          if (p.goals) setGoals({ ...defaultGoals(), ...p.goals, contacts: defaultGoals().contacts });
          if (p.currentMonth) setCurrentMonth(p.currentMonth);
          if (p.compareMonth) setCompareMonth(p.compareMonth);
        }
      } catch (e) {}

      // 2. Firestore — fonte autoritativa
      const db = getFirestore();
      if (!db) {
        clearTimeout(safetyTimer);
        setCloudStatus('offline');
        setLoaded(true);
        return;
      }
      const docRef = db.collection(CLOUD_DOC_PATH.collection).doc(CLOUD_DOC_PATH.doc);
      // Listener em tempo real: se Caio editar de outra máquina, Loretto Scarpa vê na hora
      unsubscribe = docRef.onSnapshot(
        (snap) => {
          if (snap.exists) {
            const data = snap.data();
            // Verifica se é eco da nossa própria escrita comparando hash do payload
            const incomingHash = JSON.stringify({
              months: data.months || {},
              goals: data.goals || {},
              currentMonth: data.currentMonth || '',
              compareMonth: data.compareMonth || '',
            });
            if (incomingHash === justSavedHashRef.current) {
              // É eco da nossa última escrita — não aplica (evita "ressuscitar" deletes)
              setCloudStatus('synced');
              setLastSyncAt(data.updatedAt?.toMillis ? data.updatedAt.toMillis() : Date.now());
              return;
            }
            if (data.months) setMonths(data.months);
            if (data.goals) setGoals({ ...defaultGoals(), ...data.goals, contacts: defaultGoals().contacts });
            if (data.currentMonth) setCurrentMonth(data.currentMonth);
            if (data.compareMonth) setCompareMonth(data.compareMonth);
            if (data.updatedBy) setLastSyncBy(data.updatedBy);
            setLastSyncAt(data.updatedAt?.toMillis ? data.updatedAt.toMillis() : Date.now());
          }
          setCloudStatus('synced');
          clearTimeout(safetyTimer);
          setLoaded(true);
        },
        (err) => {
          console.error('Firestore snapshot error:', err);
          setCloudStatus('error');
          clearTimeout(safetyTimer);
          setLoaded(true);
        }
      );
    })();
    return () => { clearTimeout(safetyTimer); if (unsubscribe) unsubscribe(); };
  }, []);

  // ========== SAVE: salva no localStorage imediato + Firestore com debounce 2s ==========
  const [lastSyncBy, setLastSyncBy] = useState(null);
  useEffect(() => {
    if (!loaded) return;
    // 1. Cache local imediato (offline-first)
    (async () => { try { await window.storage.set(STORAGE_KEY, JSON.stringify({ months, goals, currentMonth, compareMonth })); } catch (e) {} })();

    // 2. Firestore debounced
    const db = getFirestore();
    if (!db) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setCloudStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      try {
        // Salva hash do payload que estamos mandando — quando o snapshot voltar com esse mesmo conteúdo, ignoramos
        justSavedHashRef.current = JSON.stringify({ months, goals, currentMonth, compareMonth });
        await db.collection(CLOUD_DOC_PATH.collection).doc(CLOUD_DOC_PATH.doc).set({
          months,
          goals,
          currentMonth,
          compareMonth,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: currentProfile?.name || 'desconhecido',
        });
        setCloudStatus('synced');
        setLastSyncAt(Date.now());
      } catch (e) {
        console.error('Firestore save failed:', e);
        setCloudStatus('offline'); // continua funcionando offline com cache local
      }
    }, 800);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [months, goals, currentMonth, compareMonth, loaded, currentProfile]);

  const handleSaveMonth = (key, data) => { setMonths((m) => ({ ...m, [key]: data })); setEditingMonth(null); };

  }, [sortedKeys, currentMonth, months]);

  // FORECAST for next month
  const forecast = useMemo(() => {
    const last = sortedKeys.filter((k) => k <= currentMonth).slice(-6);

  const anomalies = useMemo(() => {

      return `${label} ${action} ${fmtPct(Math.abs(anom.deviation))} ${dir} da média de ${historicalMonths.length} meses`;
    };
    out.length = 0; // reset, do clean
    const checks = [
      { values: historicalMonths.map((m) => m.totalInvAll), cur: curM.totalInvAll, label: 'Investimento total', lowerBetter: false, neutral: true },

        /* IMPORT — MONTH SELECTOR GRID */
        .ls-import-month-section { background: ${BRAND.bgDeep}; border-radius: 6px; padding: 22px 24px; border: 1px solid ${BRAND.borderSoft}; }
        .ls-import-month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 8px; }
        .ls-import-month-chip { position: relative; padding: 12px 8px; border: 1px solid ${BRAND.border}; background: ${BRAND.surface}; color: ${BRAND.textMuted}; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.18s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .ls-import-month-chip:hover { border-color: ${BRAND.goldDim}; color: ${BRAND.cream}; }
        .ls-import-month-chip.has-data { color: ${BRAND.positive}; border-color: rgba(138,162,86,0.3); }
        .ls-import-month-chip.has-data:hover { color: ${BRAND.positive}; border-color: ${BRAND.positive}; }
        .ls-import-month-chip.active { border-color: ${BRAND.gold}; background: rgba(212,184,94,0.1); color: ${BRAND.gold}; box-shadow: inset 0 0 0 1px ${BRAND.gold}; }
        .ls-import-month-chip.active.has-data { color: ${BRAND.gold}; }
        .ls-import-month-name { font-weight: 600; }
        .ls-import-month-check { color: ${BRAND.positive}; }
        .ls-import-month-chip.active .ls-import-month-check { color: ${BRAND.gold}; }
        .ls-csv-drop:hover { border-color: ${BRAND.gold}; background: ${BRAND.goldFog}; }
        .ls-csv-drop-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; color: ${BRAND.cream}; font-weight: 500; }
        .ls-csv-drop-sub { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: ${BRAND.textMuted}; }
        .ls-csv-error { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin-top: 16px; background: rgba(201,112,112,0.12); border: 1px solid rgba(201,112,112,0.4); color: ${BRAND.negative}; font-size: 12px; border-radius: 4px; }
        .ls-csv-summary { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 16px; background: ${BRAND.bgDeep}; border-radius: 4px; border: 1px solid ${BRAND.borderSoft}; }
        .ls-csv-summary-item { display: flex; flex-direction: column; gap: 4px; }
        .ls-csv-summary-label { font-size: 8px; letter-spacing: 0.24em; text-transform: uppercase; color: ${BRAND.textMuted}; }
        .ls-csv-summary-value { font-family: 'DM Mono', monospace; font-size: 18px; color: ${BRAND.cream}; font-weight: 500; }
        .ls-csv-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .ls-csv-table th { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: ${BRAND.textMuted}; font-weight: 500; padding: 10px 8px; text-align: right; border-bottom: 1px solid ${BRAND.border}; }
        .ls-csv-table th:first-child, .ls-csv-table th:nth-child(2) { text-align: left; }
        .ls-csv-table td { padding: 10px 8px; border-bottom: 1px solid ${BRAND.borderSoft}; text-align: right; font-family: 'DM Mono', monospace; }
        .ls-csv-row-name { font-family: 'Barlow', sans-serif !important; text-align: left !important; color: ${BRAND.text}; font-size: 12px; }
        .ls-csv-row-skip { opacity: 0.4; }
        .ls-csv-tags { display: flex; gap: 4px; }
        .ls-csv-tag { background: none; border: 1px solid ${BRAND.borderSoft}; color: ${BRAND.textMuted}; padding: 4px 8px; font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 500; transition: all 0.15s; border-radius: 2px; }
        .ls-csv-tag:hover { border-color: ${BRAND.gold}; color: ${BRAND.text}; }
        .ls-csv-tag.active.ls-csv-tag-remarketing { background: ${BRAND.gold}; border-color: ${BRAND.gold}; color: ${BRAND.bg}; }
        .ls-csv-tag.active.ls-csv-tag-frio { background: ${BRAND.greenSoft}; border-color: ${BRAND.greenSoft}; color: ${BRAND.bg}; }
        .ls-csv-tag.active.ls-csv-tag-feed { background: ${BRAND.goldSoft}; border-color: ${BRAND.goldSoft}; color: ${BRAND.bg}; }
        .ls-csv-tag.active.ls-csv-tag-skip { background: ${BRAND.textDim}; border-color: ${BRAND.textDim}; color: ${BRAND.bg}; }
        .ls-csv-mode { display: flex; flex-direction: column; gap: 8px; padding: 12px; background: ${BRAND.bgDeep}; border: 1px solid ${BRAND.borderSoft}; border-radius: 4px; }
        .ls-csv-mode-opt { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 12px; line-height: 1.5; color: ${BRAND.text}; }
        .ls-csv-mode-opt input { margin-top: 3px; accent-color: ${BRAND.gold}; }
        .ls-csv-warn { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; margin-top: 16px; background: rgba(224,137,42,0.10); border-left: 2px solid ${BRAND.warning}; color: ${BRAND.text}; font-size: 11px; line-height: 1.6; font-family: 'Playfair Display', serif; font-style: italic; border-radius: 0 4px 4px 0; }
        .ls-csv-warn svg { color: ${BRAND.warning}; flex-shrink: 0; margin-top: 2px; }

        /* ORNAMENT */
        .ls-ornament { display: inline-flex; align-items: center; gap: 10px; justify-content: center; }
        .ls-orn-line { height: 1px; background: linear-gradient(to right, transparent, ${BRAND.gold}, transparent); flex: 1; min-width: 40px; }
        .ls-orn-diamond { color: ${BRAND.gold}; font-size: 8px; }

        /* MAJOR SECTION (separador WhatsApp × Feed) */
        .ls-major { display: flex; align-items: center; gap: 32px; margin: 64px 0 36px; }
        .ls-major-rule { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, ${BRAND.gold} 50%, transparent); }
        .ls-major-content { text-align: center; padding: 0 18px; }
        .ls-major-icon { color: ${BRAND.gold}; margin-bottom: 8px; display: flex; justify-content: center; }
        .ls-major-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; font-style: italic; color: ${BRAND.gold}; letter-spacing: 0.08em; line-height: 1; margin-bottom: 8px; }
        .ls-major-sub { font-size: 10px; letter-spacing: 0.36em; text-transform: uppercase; color: ${BRAND.textMuted}; font-weight: 500; }

        /* PERIOD */
        .ls-period { display: flex; gap: 16px; align-items: end; margin-bottom: 36px; padding: 20px 24px; background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; position: relative; border-radius: 4px; overflow: hidden; }
        .ls-period::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; }
        .ls-period-block { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .ls-period-block-label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: ${BRAND.textMuted}; }
        .ls-period-select { background: ${BRAND.bg}; color: ${BRAND.cream}; border: 1px solid ${BRAND.border}; padding: 11px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; outline: none; cursor: pointer; transition: border-color 0.2s; }
        .ls-period-select:focus, .ls-period-select:hover { border-color: ${BRAND.gold}; }
        .ls-period-vs { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: ${BRAND.gold}; align-self: center; padding: 0 4px; }
        .ls-period-actions { display: flex; gap: 8px; align-items: end; }

        /* MINI PERIOD BAR — substitui o card grande quando está no Painel */
        .ls-period-mini { display: flex; align-items: center; gap: 12px; padding: 12px 20px; margin-bottom: 28px; background: linear-gradient(90deg, rgba(45,53,33,0.5) 0%, rgba(20,22,16,0.3) 100%); border: 1px solid ${BRAND.borderSoft}; border-left: 2px solid ${BRAND.gold}; border-radius: 2px; font-size: 12px; color: ${BRAND.textMuted}; }
        .ls-period-mini-label { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: ${BRAND.textDim}; }
        .ls-period-mini-cur { color: ${BRAND.gold}; font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }
        .ls-period-mini-vs { font-size: 10px; letter-spacing: 0.15em; color: ${BRAND.textDim}; font-style: italic; }
        .ls-period-mini-prev { color: ${BRAND.greenSoft}; font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; font-weight: 500; }
        .ls-period-mini-edit { background: transparent; border: 1px solid ${BRAND.borderSoft}; color: ${BRAND.textMuted}; padding: 5px 10px; font-family: 'Barlow', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
        .ls-period-mini-edit:hover { color: ${BRAND.gold}; border-color: ${BRAND.goldDim}; }

        /* COMPARE VIEW — seletor grande na aba dedicada */
        .ls-compare-selector { display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: center; padding: 32px 36px; background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; border-radius: 4px; position: relative; overflow: hidden; margin-bottom: 18px; }
        .ls-compare-selector::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; }
        .ls-compare-block { display: flex; flex-direction: column; gap: 8px; }
        .ls-compare-label { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: ${BRAND.cream}; }
        .ls-compare-hint { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: ${BRAND.textDim}; }
        .ls-compare-select { padding: 14px 18px; font-size: 16px; }
        .ls-compare-vs { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ls-compare-vs-mark { font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; color: ${BRAND.gold}; }
        .ls-compare-actions { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 32px; }

        /* COMPARE SUMMARY TABLE */
        .ls-compare-summary { background: ${BRAND.surface}; border: 1px solid ${BRAND.border}; border-radius: 4px; padding: 8px 24px; margin-bottom: 32px; }
        .ls-compare-row { display: grid; grid-template-columns: 1.6fr 1fr 28px 1fr 80px; gap: 16px; align-items: center; padding: 16px 0; border-bottom: 1px solid ${BRAND.borderSoft}; }
        .ls-compare-row:last-child { border-bottom: none; }
        .ls-compare-row-label { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: ${BRAND.cream}; }
        .ls-compare-row-val { font-family: 'DM Mono', monospace; font-size: 14px; color: ${BRAND.textMuted}; text-align: right; }
        .ls-compare-row-cur { color: ${BRAND.cream}; font-weight: 600; }
        .ls-compare-row-arrow { color: ${BRAND.gold}; text-align: center; font-size: 14px; }
        .ls-compare-row-delta { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; text-align: right; padding: 4px 10px; border-radius: 2px; }
        .ls-compare-row-delta.good { color: ${BRAND.positive}; background: rgba(143,165,108,0.1); }
        .ls-compare-row-delta.bad { color: ${BRAND.negative}; background: rgba(201,112,112,0.1); }
        .ls-compare-row-delta.neutral { color: ${BRAND.textDim}; }

        /* SECTION HEADINGS */
        .ls-section-head { text-align: center; margin: 16px 0 28px; }
        .ls-section-numeral { font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; color: ${BRAND.gold}; letter-spacing: 0.3em; margin-bottom: 6px; }
        .ls-section-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 400; color: ${BRAND.cream}; margin: 0 0 8px; letter-spacing: 0.02em; }
        .ls-section-kicker { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: ${BRAND.textMuted}; font-weight: 500; }

        /* EMPTY STATE */
        .ls-empty { background: ${BRAND.surface}; border: 1px dashed ${BRAND.borderLight}; padding: 70px 40px; text-align: center; margin-bottom: 36px; }
        .ls-empty-icon { color: ${BRAND.gold}; margin-bottom: 18px; }
        .ls-empty h3 { font-family: 'Playfair Display', serif; font-size: 24px; color: ${BRAND.cream}; margin: 16px 0 12px; font-weight: 500; font-style: italic; }
        .ls-empty p { color: ${BRAND.textMuted}; font-size: 14px; max-width: 520px; margin: 0 auto 28px; line-height: 1.7; }

        /* KPI */
        .ls-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 44px; }
        .ls-kpi { background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); padding: 26px 24px 22px; position: relative; transition: transform 0.25s, box-shadow 0.25s; border: 1px solid ${BRAND.borderSoft}; border-radius: 4px; overflow: hidden; }
        .ls-kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; opacity: 0.7; }
        .ls-kpi:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,169,80,0.08); }
        .ls-kpi-corner { position: absolute; width: 14px; height: 14px; border: 1px solid; border-color: var(--accent); opacity: 0.6; }
        .ls-kpi-corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .ls-kpi-corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .ls-kpi-corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .ls-kpi-corner-br { bottom: 0; right: 0; border-left: none; border-top: none; }
        .ls-kpi-numeral { position: absolute; top: 12px; right: 18px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 12px; color: var(--accent); opacity: 0.55; letter-spacing: 0.08em; }
        .ls-kpi-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .ls-kpi-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 1px solid; border-radius: 2px; }
        .ls-kpi-label { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: ${BRAND.textMuted}; font-weight: 500; }
        .ls-kpi-value { font-family: 'DM Mono', monospace; font-size: 28px; color: ${BRAND.cream}; font-weight: 500; margin-bottom: 12px; letter-spacing: -0.02em; line-height: 1.1; }

        /* DELTA */
        .ls-delta { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; }
        .ls-delta-pct { font-weight: 500; }
        .ls-delta-abs { color: ${BRAND.textMuted}; font-size: 10px; padding-left: 6px; border-left: 1px solid ${BRAND.border}; }
        .ls-delta-pos { color: ${BRAND.positive}; }
        .ls-delta-pos .ls-delta-abs { color: ${BRAND.positive}; opacity: 0.7; }
        .ls-delta-neg { color: ${BRAND.negative}; }
        .ls-delta-neg .ls-delta-abs { color: ${BRAND.negative}; opacity: 0.7; }
        .ls-delta-neutral { color: ${BRAND.textDim}; font-family: 'DM Mono', monospace; font-size: 11px; }

        /* PROGRESS */
        .ls-progress { margin-top: 14px; padding-top: 12px; border-top: 1px solid ${BRAND.border}; }
        .ls-progress-track { height: 4px; background: ${BRAND.elevated}; border-radius: 0; overflow: hidden; margin-bottom: 6px; }
        .ls-progress-fill { height: 100%; transition: width 0.6s ease; }
        .ls-progress-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: ${BRAND.textMuted}; font-family: 'Barlow', sans-serif; }

        /* CHANNELS */
        .ls-channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 44px; }
        .ls-channel-card { background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; padding: 28px 30px; position: relative; border-radius: 4px; overflow: hidden; }
        .ls-channel-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; }
        .ls-channel-card.ls-ch-gold { border-left: 3px solid ${BRAND.gold}; }
        .ls-channel-card.ls-ch-green { border-left: 3px solid ${BRAND.greenSoft}; }
        .ls-channel-head { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 18px; border-bottom: 1px solid ${BRAND.borderSoft}; margin-bottom: 20px; }
        .ls-channel-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; font-style: italic; }
        .ls-ch-gold .ls-channel-name { color: ${BRAND.gold}; }
        .ls-ch-green .ls-channel-name { color: ${BRAND.greenSoft}; }
        .ls-channel-tag { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; }
        .ls-ch-gold .ls-channel-tag { color: ${BRAND.gold}; }
        .ls-ch-green .ls-channel-tag { color: ${BRAND.greenSoft}; }

        .ls-compare-row { padding: 11px 0; border-bottom: 1px solid ${BRAND.border}; }
        .ls-compare-row:last-child { border-bottom: none; }
        .ls-compare-label { font-size: 10px; color: ${BRAND.textMuted}; letter-spacing: 0.16em; margin-bottom: 7px; text-transform: uppercase; font-weight: 500; }
        .ls-compare-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 14px; align-items: end; }
        .ls-compare-cell-label { font-size: 9px; color: ${BRAND.textDim}; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2px; }
        .ls-compare-cell-val { font-family: 'DM Mono', monospace; font-size: 16px; color: ${BRAND.cream}; font-weight: 500; }
        .ls-compare-cell-val.ls-prev { color: ${BRAND.textMuted}; font-weight: 400; }
        .ls-compare-delta-cell { align-self: end; padding-bottom: 2px; }

        /* CHART */
        .ls-chart-card { background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; padding: 28px 30px; margin-bottom: 44px; position: relative; border-radius: 4px; overflow: hidden; }
        .ls-chart-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; }
        .ls-chart-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid ${BRAND.borderSoft}; }
        .ls-chart-title { font-family: 'Playfair Display', serif; font-size: 20px; color: ${BRAND.cream}; font-weight: 500; margin: 0; font-style: italic; }
        .ls-chart-sub { font-size: 10px; color: ${BRAND.textMuted}; letter-spacing: 0.24em; text-transform: uppercase; }

        /* DRILL */
        .ls-drill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 44px; }
        .ls-drill-card { background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; padding: 26px 28px; position: relative; border-radius: 4px; overflow: hidden; }
        .ls-drill-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; opacity: 0.8; }

        /* MÉTRICAS DE PERFIL · TAXAS DERIVADAS */
        .ls-rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .ls-rate-item { padding: 10px 0; }
        .ls-rate-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: ${BRAND.textMuted}; margin-bottom: 6px; font-weight: 500; }
        .ls-rate-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; margin-bottom: 4px; }
        .ls-rate-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: ${BRAND.textDim}; letter-spacing: 0.02em; }

        /* DISTRIBUIÇÃO POR CONTATO */
        .ls-contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 44px; }
        .ls-contact-card { background: linear-gradient(180deg, ${BRAND.surface} 0%, ${BRAND.bg} 100%); border: 1px solid ${BRAND.border}; border-radius: 4px; padding: 22px 20px 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .ls-contact-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, ${BRAND.gold} 25%, ${BRAND.gold} 75%, transparent 100%); z-index: 2; }
        .ls-contact-card.ls-contact-orphan::before { background: linear-gradient(90deg, transparent 0%, ${BRAND.warning} 25%, ${BRAND.warning} 75%, transparent 100%); }
        .ls-contact-card.ls-contact-orphan { border-color: rgba(224,137,42,0.35); }
        .ls-contact-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: ${BRAND.gold}; font-weight: 600; text-align: center; margin-bottom: 4px; letter-spacing: 0.02em; }
        .ls-contact-role { text-align: center; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: ${BRAND.textMuted}; margin-bottom: 16px; font-weight: 500; }
        .ls-contact-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; padding: 14px 0; border-top: 1px solid ${BRAND.borderSoft}; border-bottom: 1px solid ${BRAND.borderSoft}; margin-bottom: 14px; }
        .ls-contact-stat { display: flex; flex-direction: column; gap: 3px; }
        .ls-contact-stat-label { font-size: 8px; letter-spacing: 0.24em; text-transform: uppercase; color: ${BRAND.textMuted}; font-weight: 500; }
        .ls-contact-stat-value { font-family: 'DM Mono', monospace; font-size: 15px; color: ${BRAND.cream}; font-weight: 500; letter-spacing: -0.01em; }
        .ls-contact-stat-value.ls-cpl-good { color: ${BRAND.positive}; }
        .ls-contact-stat-value.ls-cpl-bad { color: ${BRAND.negative}; }
        .ls-contact-share-bar { height: 3px; background: ${BRAND.bgDeep}; border-radius: 1px; margin: 6px 0 12px; overflow: hidden; }
        .ls-contact-share-fill { height: 100%; background: ${BRAND.gold}; transition: width 0.6s ease; }
        .ls-contact-public { padding: 10px 0; border-bottom: 1px solid ${BRAND.borderSoft}; }
        .ls-contact-public:last-child { border-bottom: none; }
        .ls-contact-public-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 8px; }
        .ls-contact-public-name { font-size: 11px; color: ${BRAND.text}; font-weight: 500; letter-spacing: 0.02em; flex: 1; }

                            ];
                            return channels.map((ch) => {
                              const realPct = (ch.value / curM.totalInvAll) * 100;
                              const goalPct = ch.goal;

        </footer>
      </div>

      {editingMonth && <EditModal monthKey={editingMonth} data={months[editingMonth] || emptyMonth()} onSave={handleSaveMonth} onClose={() => setEditingMonth(null)} onDelete={() => { handleDeleteMonth(editingMonth); setEditingMonth(null); }} hasData={!!months[editingMonth]} />}
      {showGoals && <GoalsModal goals={goals} onSave={handleSaveGoals} onClose={() => setShowGoals(false)} />}
      {showImport && <ImportCSVModal targetMonth={currentMonth} currentMonths={months} contacts={goals.contacts || []} onSave={handleImportCSV} onClose={() => setShowImport(false)} />}
    </div>
  );
};

        // ═══ Mount ═══
        console.log('[LS-DASH] 4/5 About to mount React');
        try {
          const rootEl = document.getElementById('root');
          if (!rootEl) throw new Error('#root element not found');
          const root = ReactDOM.createRoot(rootEl);
          root.render(React.createElement(App));
          console.log('[LS-DASH] 5/5 React mount called successfully');
        } catch (e) {
          console.error('[LS-DASH] MOUNT FAILED:', e);
          document.getElementById('root').innerHTML = '<div style="color:#d4b85e;font-family:Playfair Display,serif;font-style:italic;font-size:24px;text-align:center;padding:80px 20px;">Erro ao montar o dashboard:<br/><br/><span style="font-size:14px;color:#f2eee0;font-family:monospace;font-style:normal">' + e.message + '</span></div>';
        }
  </script>
</body>
</html>
